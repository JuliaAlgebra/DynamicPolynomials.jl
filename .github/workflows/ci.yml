name: CI
on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Since MultivariatePolynomials doesn't have binary dependencies,
        # only test on a subset of possible platforms.
        include:
          - version: '1'
            os: ubuntu-latest
            arch: x64
          - version: '1.10'
            os: ubuntu-latest
            arch: x64
          - version: '1'
            os: ubuntu-latest
            arch: x86
          - version: 'pre'
            os: ubuntu-latest
            arch: x64
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        if: matrix.version != 'pre'
        with:
          depwarn: error
      - name: Run tests (pre, verbose)
        if: matrix.version == 'pre'
        id: pre_test
        run: |
          julia --depwarn=error --project -e 'using Pkg; Pkg.test()' 2>&1 | tee /tmp/test-output.txt || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 /tmp/test-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -q "Testing DynamicPolynomials tests passed" /tmp/test-output.txt
      - name: Post test output as PR comment
        if: failure() && matrix.version == 'pre' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/test-output.txt', 'utf8');
            const last200 = output.split('\n').slice(-200).join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Julia pre test failure\n\`\`\`\n${last200}\n\`\`\``
            });
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v4
        with:
          file: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
